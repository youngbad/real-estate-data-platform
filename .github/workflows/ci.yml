name: Data Platform CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Use the latest stable Python (3.9 and higher, as required in README)
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip' # Speeds up downloading packages from PyPI on every push
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre  # JRE is required for PySpark
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        pip install -r requirements.txt
        # Safely install airflow separately specifying a constraint file, which bypasses C++ compile issues
        pip install apache-airflow==2.7.2 --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.7.2/constraints-3.9.txt"
        pip install ruff
        
    - name: Lint with Ruff
      run: |
        # Check all errors in the project and stop the build (exit code > 0) when style or syntax errors occur
        ruff check .
        
    - name: Run unit tests with pytest
      env:
        PYTHONPATH: src
      run: |
        # Run tests from the 'tests/' directory
        pytest tests/
